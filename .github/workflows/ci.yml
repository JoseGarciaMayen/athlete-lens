name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          cd backend
          uv sync

      - name: Lint with Ruff
        run: |
          cd backend
          uvx ruff check .

      - name: Run tests
        run: |
          cd backend
          uv run pytest -m "not integration"